# 生产 compose 模板 — 复制为 docker-compose.yml，与同目录 .env 配合使用
# ECS 典型路径：/root/flower-platform/
#
#   cp docker-compose.example.yml docker-compose.yml
#   cp .env.production.example .env
#   # 编辑 .env 填入真实密钥后：
#   docker compose up -d

services:
  flower-nginx:
    image: nginx:alpine
    container_name: flower-nginx-edge
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /root/flower-nginx/conf.d:/etc/nginx/conf.d:ro
      - /root/flower-nginx/cert:/etc/nginx/cert:ro
    networks:
      - flower-prod-network
    depends_on:
      - flower-web

  flower-web:
    image: crpi-bp5b6vut8l4d7ebv.cn-hangzhou.personal.cr.aliyuncs.com/universe42/flower-platform-app:latest
    pull_policy: always
    container_name: flower-web-prod
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
    volumes:
      - next-cache:/app/.next/cache
    networks:
      - flower-prod-network
    depends_on:
      db:
        condition: service_healthy

  flower-cron-worker:
    image: crpi-bp5b6vut8l4d7ebv.cn-hangzhou.personal.cr.aliyuncs.com/universe42/flower-platform-app:latest
    pull_policy: always
    container_name: flower-cron-worker-prod
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
    entrypoint: ["npx", "tsx", "--tsconfig", "tsconfig.json", "scripts/cron-inventory-daemon.ts"]
    networks:
      - flower-prod-network
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:alpine
    container_name: flower-postgres-prod
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flower-prod-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  flower-prod-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  next-cache:
    driver: local
