name: Flower Platform CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ========================================================
      # 🔓 强制改用你自己的 SSH 凭证进行安全拉取，彻底秒杀 403
      # ========================================================
      - name: Checkout Source Code via Private SSH
        uses: actions/checkout@v4
        with:
          # 如果你的 SERVER_SSH_KEY 同时也拥有读取这个 GitHub 仓库的特权
          # 这样写能让虚拟机直接变身成为你本人，无视任何官方 Bot 的干扰
          ssh-key: ${{ secrets.SERVER_SSH_KEY }} 

      # 2. 原生构建：直接用虚拟机自带的 Docker 编译
      - name: Build Application Image via Native Docker
        run: |
          docker build -t flower-app:latest .

      # 3. 原生打包：直接用系统命令打成物理大文件
      - name: Save Image to Tar File
        run: |
          mkdir -p /tmp
          docker save -o /tmp/flower-app.tar flower-app:latest

      # 4. 原生传输：使用 Linux 自带的 scp 跨网传送
      - name: Transfer Image via Native SCP
        run: |
          echo "${{ secrets.SERVER_SSH_KEY }}" > /tmp/id_rsa
          chmod 600 /tmp/id_rsa
          scp -i /tmp/id_rsa -o StrictHostKeyChecking=no /tmp/flower-app.tar root@${{ secrets.SERVER_HOST }}:/root/flower-platform/tmp/flower-app.tar
          rm -f /tmp/id_rsa

      # 5. 原生部署：使用 Linux 自带的 ssh 登入服务器下达帅印
      - name: Execute Remote Deploy via Native SSH
        run: |
          echo "${{ secrets.SERVER_SSH_KEY }}" > /tmp/id_rsa
          chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no root@${{ secrets.SERVER_HOST }} "
            cd /root/flower-platform && \
            docker load -i tmp/flower-app.tar && \
            rm -f tmp/flower-app.tar && \
            docker compose up -d gateway web && \
            docker image prune -f
          "
          rm -f /tmp/id_rsa