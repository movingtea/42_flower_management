name: Flower Platform CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拿着特权拉代码
      - name: Checkout Source Code via Private SSH
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.SSH_KEY }}

      # 2. 原生 Docker 编译
      - name: Build Application Image via Native Docker
        run: |
          docker build -t flower-app:latest .

      # 3. 原生打包物理镜像
      - name: Save Image to Tar File
        run: |
          mkdir -p /tmp
          docker save -o /tmp/flower-app.tar flower-app:latest

      # 4. 原生传输（✨ 核心加固：投送前先自动就地建好服务器的 tmp 文件夹）
      - name: Transfer Image via Pass SCP
        env:
          HOST_IP: ${{ secrets.HOST_NAME }}
          SSH_PASS: ${{ secrets.SERVER_PASS }}
        run: |
          sudo apk add --no-cache sshpass || sudo apt-get update && sudo apt-get install -y sshpass
          
          # 🔒 核心指令：传输前，先隔空在阿里云上确保 /root/flower-platform/tmp 目录绝对存在
          sshpass -p '$SSH_PASS' ssh -o StrictHostKeyChecking=no root@$HOST_IP "mkdir -p /root/flower-platform/tmp"
          
          # 此时再去投送，绝不会再报 No such file or directory！
          sshpass -p '$SSH_PASS' scp -o StrictHostKeyChecking=no /tmp/flower-app.tar root@$HOST_IP:/root/flower-platform/tmp/flower-app.tar

      # 5. 原生部署
      - name: Execute Remote Deploy via Pass SSH
        env:
          HOST_IP: ${{ secrets.HOST_NAME }}
          SSH_PASS: ${{ secrets.SERVER_PASS }}
        run: |
          sshpass -p '$SSH_PASS' ssh -o StrictHostKeyChecking=no root@$HOST_IP "
            cd /root/flower-platform && \
            docker load -i tmp/flower-app.tar && \
            rm -f tmp/flower-app.tar && \
            docker compose up -d gateway web && \
            docker image prune -f
          "