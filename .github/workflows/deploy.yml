name: Flower Platform CI/CD Pipeline

on:
  push:
    branches:
      - master  # 🚀 这里已经对齐了你的本地 master 分支

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 🔒 修复核心：这里将版本升级为最新的稳定版 @v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # 🔒 顺便把编译组件也对齐到最新版 @v6，防止后续类似报错
      - name: Build Application Image Locally
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          tags: flower-app:latest
          outputs: type=docker,dest=/tmp/flower-app.tar

      - name: Transfer Image to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "/tmp/flower-app.tar"
          target: "/root/flower-platform/tmp/"
          strip_components: 1

      - name: Execute Remote SSH Commands to Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/flower-platform
            docker load -i tmp/flower-app.tar
            rm -f tmp/flower-app.tar
            docker compose up -d gateway web
            docker image prune -f