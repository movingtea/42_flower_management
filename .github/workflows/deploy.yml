name: Flower Platform CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: flower-app:latest
      REMOTE_PLATFORM_DIR: /root/flower-platform  # 🌟 请确保新服务器的实际目录与此路径一致

    steps:
      - name: Checkout Source Code via Private SSH
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.SSH_KEY }}

      - name: Build Application Image
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_ASSET_BASE_URL: ${{ secrets.NEXT_PUBLIC_ASSET_BASE_URL }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL:-http://localhost:3000}" \
            --build-arg NEXT_PUBLIC_ASSET_BASE_URL="${NEXT_PUBLIC_ASSET_BASE_URL:-http://localhost:3000}" \
            -t "$IMAGE_NAME" .

      - name: Save Image to Tar File
        run: |
          mkdir -p /tmp
          docker save -o /tmp/flower-app.tar "$IMAGE_NAME"

      - name: Transfer Image via Private Key SCP
        env:
          HOST_IP: ${{ secrets.HOST_NAME }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa
          chmod 600 /tmp/id_rsa
          scp -i /tmp/id_rsa -o StrictHostKeyChecking=no \
            /tmp/flower-app.tar "root@${HOST_IP}:${REMOTE_PLATFORM_DIR}/tmp/flower-app.tar"
          rm -f /tmp/id_rsa

      - name: Execute Remote Deploy via Private Key SSH
        env:
          HOST_IP: ${{ secrets.HOST_NAME }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa
          chmod 600 /tmp/id_rsa

          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no "root@${HOST_IP}" bash -s <<'REMOTE'
          set -euo pipefail
          cd "${REMOTE_PLATFORM_DIR}"

          echo "[deploy] load image..."
          docker load -i tmp/flower-app.tar
          rm -f tmp/flower-app.tar

          echo "[deploy] restart app containers (keeping database network robust)..."
          # 🌟 ✨ 核心更正一：全量对齐我们在新 docker-compose.yml 里面定义的服务名称
          # 停止并清理旧的网关、主程序、以及定时异步同步 Worker
          docker compose stop flower-nginx flower-web flower-cron-worker || true
          docker compose rm -f flower-nginx flower-web flower-cron-worker || true
          
          # 🌟 ✨ 核心更正二：在新服务器上，首次部署去掉 --no-deps，确保整个虚拟网络互通、数据库就位
          docker compose up -d flower-nginx flower-web flower-cron-worker

          echo "[deploy] wait for flower-web to finish entrypoint (migrate + boot)..."
          sleep 12

          docker compose ps

          # 🌟 ✨ 核心更正三：针对0全新数据库，将 status 改为真正推进物理表生成的 migrate deploy 命令
          echo "[deploy] enforcing prisma database physical migration..."
          docker compose exec -T flower-web npx prisma migrate deploy || true
          docker compose exec -T flower-web npx prisma generate || true

          # 🌟 ✨ 核心更正四：平滑热重载容器 Nginx 的 SSL 域名证书契约，根治地址栏变 IP 的痛点
          echo "[deploy] hot reloading nginx ssl gateway certificates..."
          docker exec flower-nginx-edge nginx -s reload || true

          echo "[deploy] recent web logs:"
          docker compose logs --tail=40 flower-web

          docker image prune -f
          echo "[deploy] all processes successfully unified. done."
          REMOTE

          rm -f /tmp/id_rsa