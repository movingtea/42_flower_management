name: Flower Platform CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      # CI 构建标签；部署到服务器后 tag 为 compose 使用的 flower-platform-app:latest
      IMAGE_BUILD_TAG: flower-app:build
      IMAGE_RUNTIME_TAG: flower-platform-app:latest
      REMOTE_PLATFORM_DIR: /root/flower-platform

    steps:
      - name: Checkout Source Code via Private SSH
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.SSH_KEY }}

      - name: Build Application Image
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_ASSET_BASE_URL: ${{ secrets.NEXT_PUBLIC_ASSET_BASE_URL }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL:-http://localhost:3000}" \
            --build-arg NEXT_PUBLIC_ASSET_BASE_URL="${NEXT_PUBLIC_ASSET_BASE_URL:-http://localhost:3000}" \
            -t "$IMAGE_BUILD_TAG" .

      - name: Save Image to Tar File
        run: |
          mkdir -p /tmp
          docker save -o /tmp/flower-app.tar "$IMAGE_BUILD_TAG"

      - name: Transfer Image via Private Key SCP
        env:
          HOST_IP: ${{ secrets.HOST_NAME }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa
          chmod 600 /tmp/id_rsa
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no "root@${HOST_IP}" "mkdir -p ${REMOTE_PLATFORM_DIR}/tmp"
          scp -i /tmp/id_rsa -o StrictHostKeyChecking=no \
            /tmp/flower-app.tar "root@${HOST_IP}:${REMOTE_PLATFORM_DIR}/tmp/flower-app.tar"
          rm -f /tmp/id_rsa

      - name: Execute Remote Deploy via Private Key SSH
        env:
          HOST_IP: ${{ secrets.HOST_NAME }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          IMAGE_RUNTIME_TAG: ${{ env.IMAGE_RUNTIME_TAG }}
          REMOTE_PLATFORM_DIR: ${{ env.REMOTE_PLATFORM_DIR }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa
          chmod 600 /tmp/id_rsa

          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no "root@${HOST_IP}" \
            "IMAGE_RUNTIME_TAG=${IMAGE_RUNTIME_TAG} REMOTE_PLATFORM_DIR=${REMOTE_PLATFORM_DIR} bash -s" <<'REMOTE'
          set -euo pipefail
          cd "${REMOTE_PLATFORM_DIR}"

          echo "[deploy] load image..."
          docker load -i tmp/flower-app.tar
          rm -f tmp/flower-app.tar

          echo "[deploy] tag for docker-compose (${IMAGE_RUNTIME_TAG})..."
          docker tag flower-app:build "${IMAGE_RUNTIME_TAG}"

          echo "[deploy] restart app stack (db container untouched)..."
          docker compose stop flower-nginx flower-web flower-cron-worker || true
          docker compose rm -f flower-nginx flower-web flower-cron-worker || true
          docker compose up -d --no-deps flower-web flower-cron-worker
          docker compose up -d --no-deps flower-nginx

          echo "[deploy] wait for flower-web entrypoint (migrate + boot)..."
          ok=0
          for i in $(seq 1 30); do
            if docker compose exec -T flower-web wget -qO- "http://127.0.0.1:3000/login" >/dev/null 2>&1; then
              ok=1
              break
            fi
            sleep 3
          done
          if [ "$ok" -ne 1 ]; then
            echo "[deploy] WARNING: flower-web health probe timed out"
            docker compose logs --tail=80 flower-web
            exit 1
          fi

          echo "[deploy] prisma migrate status:"
          docker compose exec -T flower-web npx prisma migrate status

          echo "[deploy] reload nginx (SSL / upstream)..."
          docker exec flower-nginx-edge nginx -s reload || true

          docker compose ps
          docker compose logs --tail=30 flower-web
          docker compose logs --tail=15 flower-cron-worker || true

          docker image prune -f
          echo "[deploy] done."
          REMOTE

          rm -f /tmp/id_rsa
