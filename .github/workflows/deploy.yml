name: Flower Platform CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取源码（这里也对齐你的 SSH_KEY，实现你本人的物理特权拉取）
      - name: Checkout Source Code via Private SSH
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.SSH_KEY }} # 🚀 完美对齐你的 SSH_KEY

      # 2. 原生 Docker 编译
      - name: Build Application Image via Native Docker
        run: |
          docker build -t flower-app:latest .

      # 3. 原生打包
      - name: Save Image to Tar File
        run: |
          mkdir -p /tmp
          docker save -o /tmp/flower-app.tar flower-app:latest

      # 4. 原生传输
      - name: Transfer Image via Native SCP
        env:
          HOST_IP: ${{ secrets.HOST_NAME }} # 🚀 完美对齐你的 HOST_NAME
          SSH_KEY: ${{ secrets.SSH_KEY }}   # 🚀 完美对齐你的 SSH_KEY
        run: |
          if [ -z "$HOST_IP" ] || [ -z "$SSH_KEY" ]; then
            echo "错误：GitHub Secrets 读取失败，请检查配置！"
            exit 1
          fi

          echo "$SSH_KEY" > /tmp/id_rsa
          chmod 600 /tmp/id_rsa
          
          scp -i /tmp/id_rsa -o StrictHostKeyChecking=no /tmp/flower-app.tar root@$HOST_IP:/root/flower-platform/tmp/flower-app.tar
          rm -f /tmp/id_rsa

      # 5. 原生部署
      - name: Execute Remote Deploy via Native SSH
        env:
          HOST_IP: ${{ secrets.HOST_NAME }} # 🚀 完美对齐你的 HOST_NAME
          SSH_KEY: ${{ secrets.SSH_KEY }}   # 🚀 完美对齐你的 SSH_KEY
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa
          chmod 600 /tmp/id_rsa
          
          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no root@$HOST_IP "
            cd /root/flower-platform && \
            docker load -i tmp/flower-app.tar && \
            rm -f tmp/flower-app.tar && \
            docker compose up -d gateway web && \
            docker image prune -f
          "
          rm -f /tmp/id_rsa