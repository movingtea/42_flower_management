name: Flower Platform CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: flower-app:latest
      REMOTE_PLATFORM_DIR: /root/flower-platform

    steps:
      - name: Checkout Source Code via Private SSH
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.SSH_KEY }}

      - name: Build Application Image
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_ASSET_BASE_URL: ${{ secrets.NEXT_PUBLIC_ASSET_BASE_URL }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL:-http://localhost:3000}" \
            --build-arg NEXT_PUBLIC_ASSET_BASE_URL="${NEXT_PUBLIC_ASSET_BASE_URL:-http://localhost:3000}" \
            -t "$IMAGE_NAME" .

      - name: Save Image to Tar File
        run: |
          mkdir -p /tmp
          docker save -o /tmp/flower-app.tar "$IMAGE_NAME"

      - name: Transfer Image via Private Key SCP
        env:
          HOST_IP: ${{ secrets.HOST_NAME }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa
          chmod 600 /tmp/id_rsa
          scp -i /tmp/id_rsa -o StrictHostKeyChecking=no \
            /tmp/flower-app.tar "root@${HOST_IP}:${REMOTE_PLATFORM_DIR}/tmp/flower-app.tar"
          rm -f /tmp/id_rsa

      - name: Execute Remote Deploy via Private Key SSH
        env:
          HOST_IP: ${{ secrets.HOST_NAME }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/id_rsa
          chmod 600 /tmp/id_rsa

          ssh -i /tmp/id_rsa -o StrictHostKeyChecking=no "root@${HOST_IP}" bash -s <<'REMOTE'
          set -euo pipefail
          cd /root/flower-platform

          echo "[deploy] load image..."
          docker load -i tmp/flower-app.tar
          rm -f tmp/flower-app.tar

          echo "[deploy] restart app containers (db untouched)..."
          docker compose stop gateway web || true
          docker compose rm -f gateway web || true
          docker compose up -d --no-deps gateway web

          echo "[deploy] wait for web to finish entrypoint (migrate + boot)..."
          sleep 12

          docker compose ps

          echo "[deploy] prisma migrate status:"
          docker compose exec -T web npx prisma migrate status || true

          echo "[deploy] recent web logs:"
          docker compose logs --tail=40 web

          docker image prune -f
          echo "[deploy] done."
          REMOTE

          rm -f /tmp/id_rsa
