name: Flower Platform CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 唯独保留最核心的源码拉取（这个极其稳定，走 Git 协议）
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. 纯原生：直接在 GitHub 的 Linux 虚拟机上用原生的 docker build 命令打包
      - name: Build Application Image via Native Docker
        run: |
          docker build -t flower-app:latest .

      # 3. 纯原生：直接用原生的 docker save 命令把镜像导出为物理压缩包
      - name: Save Image to Tar File
        run: |
          mkdir -p /tmp
          docker save -o /tmp/flower-app.tar flower-app:latest

      # 4. 传输：将镜像跨网空降到你的阿里云服务器
      - name: Transfer Image to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "/tmp/flower-app.tar"
          target: "/root/flower-platform/tmp/"
          strip_components: 1

      # 5. 执掌帅印：让服务器加载新镜像，完成旧容器的秒级无损交替
      - name: Execute Remote SSH Commands to Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/flower-platform
            docker load -i tmp/flower-app.tar
            rm -f tmp/flower-app.tar
            docker compose up -d gateway web
            docker image prune -f